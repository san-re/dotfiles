
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

bind-key -r f display-popup -E "tmux-sessionizer"
bind-key F run-shell "echo 'hello from f'"

bind -n C-x kill-pane         # Close current pane

# fix colors inside tmux
set -g terminal-overrides '*:Tc'

# --- Window Management ---
set -g base-index 1 # starts windows at 1
setw -g pane-base-index 1 # starts on 1st window
set -g renumber-windows on # renums when a window is closed

# bind -n C-t new-window -c "#{pane_current_path}" -n "New" 
# bind -n C-k next-window          # Move to the next window
# bind -n C-j previous-window      # Move to the previous window

set-option -g mouse on          # Enable mouse support for resizing/switching
set-option -g history-limit 10000  # Increase scrollback history

set -g status-position top # status bar at the top
set-option -g status-style fg=white,bg=black  # Improve status bar readability

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible' # fixes so it's less slow

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/plugins/tpm/tpm'
